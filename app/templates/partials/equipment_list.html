{# Equipment list with add/remove — swapped via HTMX #}
<div id="equipment-list">
    {% if character.inventory %}
    {% for item in character.inventory %}
    <div class="text-sm py-1 flex items-center justify-between group">
        <div class="flex items-center gap-2">
            <button hx-post="{{ url_for('characters.toggle_equipment', character_id=character.id, item_id=item.id) }}"
                    hx-target="#equipment-list" hx-swap="outerHTML"
                    class="w-4 h-4 rounded border border-th-faint flex items-center justify-center text-xs
                    {% if item.equipped %}bg-th-accent text-white border-th-accent{% else %}bg-transparent{% endif %}
                    hover:opacity-80 cursor-pointer transition-colors"
                    title="{% if item.equipped %}Equipped{% else %}Stowed{% endif %}">
                {% if item.equipped %}&#10003;{% endif %}
            </button>
            <span class="{% if not item.equipped %}text-th-faint{% else %}text-th-text{% endif %}">{{ item.name }}</span>
            {% if item.quantity > 1 %}<span class="text-th-faint">x{{ item.quantity }}</span>{% endif %}
        </div>
        <button hx-post="{{ url_for('characters.remove_equipment', character_id=character.id, item_id=item.id) }}"
                hx-target="#equipment-list" hx-swap="outerHTML"
                class="text-red-400 hover:text-red-500 opacity-0 group-hover:opacity-100 text-xs px-1 transition-opacity"
                title="Remove">&#10005;</button>
    </div>
    {% endfor %}
    {% else %}
    <p class="text-sm text-th-faint">No equipment.</p>
    {% endif %}

    {# Add item form #}
    <div class="mt-2 flex flex-wrap gap-2">
        <input type="text" name="name" placeholder="Item name..."
               class="flex-1 text-sm border border-th-input-border bg-th-input-bg text-th-text rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-th-accent"
               id="new-item-name-{{ character.id }}">
        <input type="number" name="quantity" value="1" min="1"
               class="w-12 text-sm text-center border border-th-input-border bg-th-input-bg text-th-text rounded px-1 py-1 focus:outline-none focus:ring-1 focus:ring-th-accent"
               id="new-item-qty-{{ character.id }}">
        <button hx-post="{{ url_for('characters.add_equipment', character_id=character.id) }}"
                hx-target="#equipment-list" hx-swap="outerHTML"
                hx-include="#new-item-name-{{ character.id }}, #new-item-qty-{{ character.id }}"
                class="bg-th-accent hover:bg-th-accent-h text-white text-sm px-3 py-1 rounded transition-colors">
            Add
        </button>
    </div>
</div>
