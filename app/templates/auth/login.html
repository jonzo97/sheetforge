{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <h1 class="text-2xl font-brand font-bold mb-6 text-th-text">Login</h1>
    <form method="POST" class="space-y-4 card p-6 shadow-sm">
        <div>
            <label for="username" class="block text-sm font-medium mb-1 text-th-text">Username</label>
            <input type="text" id="username" name="username" required autofocus
                   class="w-full px-3 py-2 border border-th-input-border bg-th-input-bg text-th-text rounded-md focus:outline-none focus:ring-2 focus:ring-th-accent">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium mb-1 text-th-text">Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-3 py-2 border border-th-input-border bg-th-input-bg text-th-text rounded-md focus:outline-none focus:ring-2 focus:ring-th-accent">
        </div>
        <button type="submit" class="w-full bg-th-accent text-white py-2 px-4 rounded-md hover:bg-th-accent-h transition-colors">
            Login
        </button>
    </form>
    <p class="mt-4 text-sm text-th-muted">
        Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-th-accent hover:underline">Register</a>
    </p>
</div>
{% endblock %}
